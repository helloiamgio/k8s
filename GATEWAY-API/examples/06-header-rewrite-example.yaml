apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: coffee-with-header
spec:
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames:
    - cafe.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /coffee
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: x-lab
                value: gateway-api
      backendRefs:
        - name: coffee
          port: 80
